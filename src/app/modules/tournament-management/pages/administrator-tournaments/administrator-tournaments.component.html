<div class="administrator-tournaments">
	<div class="filters">
		<app-tournament-filters
			[users$]="allUsers$"
			(filtersChanged)="onFiltersChanged($event)">
		</app-tournament-filters>
	</div>

	<div class="all-tournaments">
		<ng-container *ngIf="allTournaments.length > 0">
			<app-tournament-card [tournament]="tournament" cardType="administrator" *ngFor="let tournament of filteredTournaments"></app-tournament-card>
		</ng-container>
	</div>
</div>
