<div class="import-tournament">
	<div class="filters">
		<app-tournament-filters
			[users$]="allUsers$"
			(filtersChanged)="onFiltersChanged($event)">
		</app-tournament-filters>
	</div>

	<div id="tutorial-all-tournaments" class="all-tournaments">
		<cdk-virtual-scroll-viewport itemSize="74" class="viewport">
			<div class="tournament-card" *cdkVirtualFor="let tournament of filteredTournaments">
				<app-tournament-card [tournament]="tournament" cardType="import"></app-tournament-card>
			</div>
		</cdk-virtual-scroll-viewport>
	</div>
</div>
