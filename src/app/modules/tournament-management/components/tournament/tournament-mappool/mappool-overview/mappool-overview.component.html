<div class="container-fluid">
	<div class="row">
		<div class="col">
			<div class="buttons">
				<button mat-raised-button color="accent" (click)="createNewMappool()">
					<mat-icon>add</mat-icon> create new mappool
				</button>

				<button mat-raised-button color="accent" (click)="importWyBinMappool()" *ngIf="tournament.hasWyBinConnected()">
					<mat-icon>add</mat-icon> <mat-icon class="sync" [ngClass]="{'rotate': importingFromWyBin == true}">sync</mat-icon> import mappool from wyBin
				</button>
			</div>

			<div class="wybin-import-nofail" *ngIf="tournament.hasWyBinConnected()">
				<mat-slide-toggle [(ngModel)]="addNoFail">Add NoFail to all mod brackets when importing</mat-slide-toggle>

				<hr />
			</div>

			<div class="wybin-mappools">
				<div class="wybin-mappool" *ngFor="let mappool of wyBinMappools" (click)="importMappool(mappool)">
					Import {{ mappool.name }}
				</div>
			</div>

			<form [formGroup]="form">
				<div class="mappool-spacing" *ngIf="mappools.length > 0"></div>

				<app-alert alertType="warn" *ngIf="mappools.length == 0">
					There are no mappools yet.
				</app-alert>

				<div class="mappools" formArrayName="mappools">
					<div class="mappool" *ngFor="let mappoolGroup of mappools.controls; let i = index" [formGroupName]="i">
						<div class="header" (click)="collapseMappool(mappoolGroup, $event)">
							<div class="name">
								<h3>{{ mappoolGroup.get('name')?.value }}</h3>
							</div>

							<div class="actions">
								<button mat-mini-fab color="warn" (click)="deleteMappool(i)"><mat-icon>delete</mat-icon></button>
							</div>
						</div>

						<div class="body" *ngIf="collapsedState.get(mappoolGroup) == false">
							<app-mappool [tournament]="tournament" [form]="mappoolGroup"></app-mappool>
						</div>
					</div>
				</div>
			</form>
		</div>
	</div>
</div>
