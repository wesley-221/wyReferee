<div class="tournament" [ngClass]="{ 'published-tournament': cardType == 'published', 'no-hover': cardType == 'import' || cardType == 'administrator' }">
	<div class="header">
		<div class="information">
			<div class="id" matTooltip="Tournament import id" *ngIf="tournament.publishId != null">
				{{ tournament.publishId }}
			</div>

			<div class="id" matTooltip="Tournament import id" *ngIf="cardType == 'published' && tournament.publishId == null">
				{{ tournament.id }}
			</div>

			<div class="tournament-name">
				<div class="name">
					{{ tournament.name }}
				</div>

				<div class="created-by" *ngIf="tournament.createdBy">
					<i>by <a [href]="" (click)="electronService.openLink(tournament.createdBy.getOsuProfileUrl())">{{ tournament.createdBy.username }}</a></i>
				</div>
			</div>
		</div>

		<div class="buttons">
			<ng-container *ngIf="cardType == 'local'">
				<button mat-stroked-button color="primary" matTooltip="Go to published tournament" [matTooltipPosition]="'above'" (click)="goToPublishedTournament(tournament)" *ngIf="authenticateService.loggedIn == true && tournament.publishId != null">
					<mat-icon>link</mat-icon>
				</button>

				<button mat-stroked-button color="primary" matTooltip="Publish this tournament" [matTooltipPosition]="'above'" (click)="publishTournament(tournament)" *ngIf="tournament.publishId == null">
					<mat-icon>cloud_upload</mat-icon>
				</button>

				<button mat-stroked-button color="warn" matTooltip="Delete this tournament" [matTooltipPosition]="'above'" (click)="deleteTournament(tournament)">
					<mat-icon>delete</mat-icon>
				</button>
			</ng-container>

			<ng-container *ngIf="cardType == 'published'">
				<button mat-stroked-button color="warn" matTooltip="Delete this tournament" [matTooltipPosition]="'above'" (click)="deleteTournament(tournament)">
					<mat-icon>delete</mat-icon>
				</button>
			</ng-container>

			<ng-container *ngIf="cardType == 'import'">
				<button mat-stroked-button color="primary" matTooltip="Import this tournament" [matTooltipPosition]="'above'" (click)="importTournament(tournament)">
					<mat-icon>cloud_download</mat-icon>
				</button>
			</ng-container>

			<ng-container *ngIf="cardType == 'administrator'">
				<button mat-stroked-button color="accent" matTooltip="Edit this tournament" [matTooltipPosition]="'above'" (click)="editTournament(tournament)">
					<mat-icon>edit</mat-icon>
				</button>

				<button mat-stroked-button color="primary" matTooltip="Import this tournament" [matTooltipPosition]="'above'" (click)="importTournament(tournament)">
					<mat-icon>cloud_download</mat-icon>
				</button>

				<button mat-stroked-button color="warn" matTooltip="Delete this tournament" [matTooltipPosition]="'above'" (click)="deleteTournament(tournament)">
					<mat-icon>delete</mat-icon>
				</button>
			</ng-container>
		</div>
	</div>

	<hr *ngIf="cardType != 'import' && cardType != 'administrator'" />

	<div class="body" *ngIf="cardType != 'import' && cardType != 'administrator'">
		<div class="body-blocks">
			<h3>Administrators</h3>

			<div class="all-administrators">
				<div class="administrator" *ngIf="tournament.administrators.length <= 0">
					<app-alert alertType="info">There are no administrators.</app-alert>
				</div>

				<div class="administrator" *ngFor="let administrator of tournament.administrators">
					<a [href]="" (click)="electronService.openLink(administrator.getOsuProfileUrl())">{{ administrator.username }}</a>
				</div>
			</div>
		</div>

		<div class="body-blocks mappool-area">
			<h3>Mappools</h3>

			<div class="mappools">
				<div class="mappool" *ngFor="let mappool of tournament.mappools">
					{{ mappool.name }}
				</div>
			</div>
		</div>

		<div class="body-blocks">
			<h3 *ngIf="!tournament.isSoloTournament()">Team count</h3>
			<h3 *ngIf="tournament.isSoloTournament()">Player count</h3>
			{{ tournament.teams.length }}
		</div>
	</div>
</div>
