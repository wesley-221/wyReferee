<app-toast></app-toast>
<app-debug [data]="{ selectedChannel, selectedLobby }"></app-debug>

<div class="irc">
	<div class="first-pick-not-set" *ngIf="selectedLobby && (selectedLobby.firstPick == null || selectedLobby.bestOf == null)" (click)="openLobbyDialog()">
		You haven't set the <b>First pick</b> of the match yet. Click here to set who picks first.
	</div>

	<div class="irc-match-body" [style.--sidebar-left-width]="sidebarLeftWidth + 'px'" [style.--sidebar-right-width]="sidebarRightWidth + 'px'">
		<div class="irc-sidebar-container left">
			@if(!layoutEditorOpen) {
				<div class="irc-sidebar-header">
					<button class="form-button danger" (click)="goBack()">
						<mat-icon>arrow_left</mat-icon> back
					</button>

					<button class="form-button primary" (click)="joinChannel()" [disabled]="!ircService.isAuthenticated">
						<mat-icon>add</mat-icon> join
					</button>
				</div>

				<div class="irc-sidebar-header">
					<button class="form-button primary" (click)="openLayoutEditor()">
						<mat-icon>edit</mat-icon> edit layout
					</button>
				</div>

				<div class="irc-sidebar left">
					<ng-container *ngFor="let sidebarItem of sidebarLeftSections | async">
						<ng-container *ngTemplateOutlet="getTemplate(sidebarItem.view); context: { $implicit: sidebarItem }"></ng-container>
					</ng-container>
				</div>
			}
			@else {
				<app-irc-sidebar-layout-editor
					sidebar="left"
				/>
			}
		</div>

		<div class="irc-sidebar-resize left"
			appResize
			resizeAxis="x"
			resizingClass="resizing-x"
			container=".irc-match-body"
			[min]="250"
			(sizeChanged)="resizeSidebar('left', $event)"
			(sizeChangedEnd)="saveResizeSidebar('left', $event)"
		>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
		</div>

		<div class="irc-body">
			@if(!layoutEditorOpen) {
				<div class="irc-chat-container">
					<app-irc-chat-container
						[selectedLobby]="selectedLobby"
						[selectedChannel]="selectedChannel"
						[normalChats]="normalChats"
						[banchoBotChats]="banchoBotChats"
						(pickBeatmapFromAcronymEmitter)="pickBeatmapFromAcronym($event)"
						(adjustScoreEmitter)="adjustScore($event.team, $event.mouseClick)"
					/>
				</div>

				<div class="irc-chat-controls">
					<app-irc-shortcut-commands
						[lobby]="selectedLobby"
						[channel]="selectedChannel"
						(focusChat)="focusChat($event)"
					/>

					<app-irc-chat-controls
						[activeSlashCommand]="activeSlashCommand"
						[allSlashCommandsFiltered]="allSlashCommandsFiltered"
						(sendMessageEmitter)="sendMessage($event)"
						(handleKeyboardEventEmitter)="handleKeyboardEvent($event)"
						(selectSlashCommandEmitter)="selectSlashCommand($event)"
					/>
				</div>
			}
			@else {
				<app-irc-layout-library
					(closeLayoutEditorEmitter)="layoutEditorOpen = false"
				/>
			}
		</div>

		<div class="irc-sidebar-resize right"
			appResize
			resizeAxis="x"
			resizingClass="resizing-x"
			container=".irc-match-body"
			[min]="250"
			[reverse]="true"
			(sizeChanged)="resizeSidebar('right', $event)"
			(sizeChangedEnd)="saveResizeSidebar('right', $event)"
		>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
		</div>

		<div class="irc-sidebar-container right" *ngIf="selectedChannel != null && selectedChannel.name.startsWith('#mp_')">
			<div class="irc-sidebar right">
				@if(!layoutEditorOpen) {
					<ng-container *ngFor="let sidebarItem of sidebarRightSections | async">
						<ng-container *ngTemplateOutlet="getTemplate(sidebarItem.view); context: { $implicit: sidebarItem }"></ng-container>
					</ng-container>
				}
				@else {
					<app-irc-sidebar-layout-editor
						sidebar="right"
					/>
				}
			</div>
		</div>
	</div>
</div>

<ng-template #ircChannelsTemplate let-sidebarItem>
	<div class="sidebar-item" [style.height]="sidebarItem.size != null ? (sidebarItem.size + 16) + 'px' : 'auto'">
		<div class="content">
			<app-irc-lobbies
				[selectedChannel]="selectedChannel"
				[channels]="channels"
				(changeChannel)="changeChannel($event)"
			/>
		</div>

		<div class="irc-sidebar-resize bottom"
			appResize
			resizeAxis="y"
			resizingClass="resizing-y"
			container="parent"
			[max]="500"
			(sizeChanged)="resizeIrcSection(sidebarItem, $event, false)"
			(sizeChangedEnd)="resizeIrcSection(sidebarItem, $event, true)"
		>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
		</div>
	</div>
</ng-template>

<ng-template #playerManagementTemplate let-sidebarItem>
	<div class="sidebar-item auto">
		<div class="content">
			<app-irc-player-management
				[lobby]="selectedLobby"
				[channel]="selectedChannel"
				*ngIf="selectedLobby != undefined && selectedChannel != undefined && selectedChannel.name.startsWith('#mp_')"
			/>
		</div>
	</div>
</ng-template>

<ng-template #mappoolTemplate let-sidebarItem>
	<div class="sidebar-item auto">
		<div class="content">
			<app-irc-mappool
				[selectedLobby]="selectedLobby"
				[selectedChannel]="selectedChannel"
				[searchValue]="searchValue"
				(banBeatmapEmitter)="banBeatmap($event.beatmap, $event.modBracket, $event.multiplayerLobby)"
				(unbanBeatmapEmitter)="unbanBeatmap($event)"
				(protectBeatmapEmitter)="protectBeatmap($event.beatmap, $event.modBracket, $event.multiplayerLobby)"
				(unprotectBeatmapEmitter)="unprotectBeatmap($event)"
				(changePickedByEmitter)="changePickedBy($event)"
				(pickBeatmapEmitter)="pickBeatmap($event.beatmap, $event.modBracket, $event.gamemode)"
				(unpickBeatmapEmitter)="unpickBeatmap($event)"
			/>
		</div>
	</div>
</ng-template>
