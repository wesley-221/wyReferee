<div class="irc-layout-library">
	<div class="irc-layout-library-header">
		<div class="header">
			Section library
		</div>

		<div class="description">
			Customize your irc layout.
		</div>
	</div>

	<div class="actions">
		<button class="form-button primary" (click)="saveChanges()" [disabled]="!(hasChanged$ | async)">
			<mat-icon>save</mat-icon> save changes
		</button>

		<button class="form-button danger" (click)="discardChanges()" [disabled]="!(hasChanged$ | async)">
			<mat-icon>close</mat-icon> discard changes
		</button>

		<button class="form-button danger" (click)="resetLayout()">
			<mat-icon>restore</mat-icon> reset to default
		</button>

		<button class="form-button danger margin-left-auto" (click)="closeLibrary()">
			<mat-icon>close</mat-icon> close library
		</button>
	</div>

	<div class="body">
		<div
			id="layout-library"
			class="sections"
			cdkDropList
			[cdkDropListSortingDisabled]="true"
			[cdkDropListConnectedTo]="['sidebar-dropzone-left', 'sidebar-dropzone-right']"
		>
			<div
				class="section"
				*ngFor="let layout of layouts"
				cdkDrag
				[cdkDragData]="layout"
				(cdkDragStarted)="onDragStarted()"
				(cdkDragEnded)="onDragEnded()"
			>
				<div class="section-header">
					<mat-icon>{{ layout.icon }}</mat-icon> {{ layout.header }}
				</div>

				<div class="section-body">
					{{ layout.body }}
				</div>

				<div *cdkDragPreview class="drag-preview">
					<mat-icon>{{ layout.icon }}</mat-icon> {{ layout.header }}
				</div>

				<div *cdkDragPlaceholder class="placeholder"></div>
			</div>
		</div>
	</div>
</div>
