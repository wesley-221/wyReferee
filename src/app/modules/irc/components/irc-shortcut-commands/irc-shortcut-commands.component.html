<div class="action-bar">
	<div class="actions">
		<div class="button" *ngFor="let ircShortcutCommand of ircShortcutCommandsService.ircShortcutCommands" [ngClass]="{'disabled': !ircService.isAuthenticated}" (click)="executeIrcShortcutCommand(ircShortcutCommand)">
			{{ ircShortcutCommand.label }}
		</div>
	</div>

	<div class="settings">
		<button class="button" color="primary" (click)="shortcutSettings()">
			<mat-icon>settings</mat-icon>
		</button>
	</div>
</div>
