<div class="player-management">
	<div class="slot-information">
		<div class="label">
			Slots
		</div>

		<div class="slot-count">
			({{ playerCount }} / {{ channel.players ?? 0 }})
		</div>
	</div>

	<div class="players">
		<div class="player" *ngFor="let player of multiplayerLobbyPlayers.players" [ngClass]="{'red': player.team == 'Red', 'blue': player.team == 'Blue'}">
			<div class="player-information">
				<div class="player-slot">
					{{ player.slot }}
				</div>

				<div class="player-username">
					{{ player.username }}
				</div>

				<div class="mods">
					<div class="mod-icon" *ngFor="let mod of player.mods">
						<img *ngIf="mod" [src]="'assets/osu-mods/' + mod + '.png'" [matTooltip]="mod | uppercase" />
						<img *ngIf="mod == null" src="assets/osu-mods/nm.png" [matTooltip]="'nm' | uppercase" />
					</div>
				</div>

				<div class="player-status-container">
					<div class="player-status" [ngClass]="{'ready': player.status == 'Ready'}">
						{{ player.status }}
					</div>
				</div>
			</div>

			<div class="action-buttons">
				<button class="form-button small-button" [disabled]="player.username == 'Open'" [title]="'Move ' + player.username" (click)="movePlayer(player)">
					<mat-icon class="icon">open_with</mat-icon>
				</button>

				<button class="form-button small-button" [disabled]="player.username == 'Open'" [title]="'Change ' + player.username + '\'s team'" (click)="changeTeam(player)">
					<mat-icon class="icon">groups</mat-icon>
				</button>

				<button class="form-button small-button" [disabled]="player.isHost || player.username == 'Open'" [title]="'Give host to ' + player.username" (click)="setHost(player)">
					<mat-icon class="icon">star</mat-icon>
				</button>

				<button class="form-button small-button danger" [disabled]="player.username == 'Open'" [title]="'Kick ' + player.username" (click)="kickPlayer(player)">
					<mat-icon class="icon">close</mat-icon>
				</button>
			</div>
		</div>
	</div>
</div>
